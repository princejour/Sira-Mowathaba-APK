name: Build APK from final multi records A4 ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Files in repository:"
          ls -lah

      - name: Verify ZIP file
        run: |
          if [ ! -f "PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED_BUTTONS_DOWN_ONLY_MULTI_RECORDS_A4_FIXED.zip" ]; then
            echo "ERROR: ZIP file not found."
            echo "Required file:"
            echo "PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED_BUTTONS_DOWN_ONLY_MULTI_RECORDS_A4_FIXED.zip"
            echo ""
            echo "Current files:"
            ls -lah
            exit 1
          fi

      - name: Unzip project
        run: |
          rm -rf project
          mkdir project
          unzip -q "PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED_BUTTONS_DOWN_ONLY_MULTI_RECORDS_A4_FIXED.zip" -d project

      - name: Find Android project
        id: project
        run: |
          PROJECT_DIR="$(find project -name settings.gradle | head -n 1 | xargs dirname)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Android project not found. settings.gradle missing."
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Project found at: $PROJECT_DIR"

      - name: Verify final corrections
        run: |
          MAIN="${{ steps.project.outputs.project_dir }}/app/src/main/java/com/walhero/siramowathaba/MainActivity.java"
          HTML="${{ steps.project.outputs.project_dir }}/app/src/main/assets/index.html"

          echo "Checking MainActivity.java..."
          grep -n "printCurrentStudentRecordNative" "$MAIN"
          grep -n "openAndroidPrintDialog" "$MAIN"
          grep -n "backParams.setMargins(dp(8), dp(48)" "$MAIN"
          grep -n "printParams.setMargins(dp(8), dp(48)" "$MAIN"

          echo "Checking multi records print fix..."
          grep -n "function executeMultiPrint" "$HTML"
          grep -n "MULTI_RECORDS_A4_FIXED" "$HTML" || true
          grep -n "AndroidBridge.printHtml(html)" "$HTML"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Clean and build APK
        run: |
          cd "${{ steps.project.outputs.project_dir }}"
          gradle clean assembleDebug --no-build-cache

      - name: Rename APK
        run: |
          mkdir -p final-apk
          cp "${{ steps.project.outputs.project_dir }}"/app/build/outputs/apk/debug/*.apk "final-apk/sira-mowathaba-final-multi-records-a4.apk"
          ls -lah final-apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sira-mowathaba-final-multi-records-a4-apk
          path: final-apk/*.apk
