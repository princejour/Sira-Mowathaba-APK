name: Build APK from corrected ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "ROOT FILES:"
          ls -lah

      - name: Check corrected ZIP exists
        run: |
          if [ ! -f "PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED.zip" ]; then
            echo "ERROR: ملف PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED.zip غير موجود في جذر المستودع"
            echo "الملفات الموجودة:"
            ls -lah
            exit 1
          fi

          echo "Found corrected ZIP:"
          ls -lh PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED.zip
          sha256sum PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED.zip

      - name: Unzip corrected project
        run: |
          rm -rf project
          mkdir project
          unzip -q "PRINT_BUTTON_REAL_ATTEMPT_COMPILE_FIXED.zip" -d project

          echo "Extracted files:"
          find project -maxdepth 4 -type f | head -n 100

      - name: Find Android project
        id: find_project
        run: |
          PROJECT_DIR="$(find project -name settings.gradle | head -n 1 | xargs dirname)"

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: settings.gradle غير موجود داخل ملف ZIP"
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Android project folder: $PROJECT_DIR"

      - name: Verify corrected print code exists
        run: |
          MAIN="${{ steps.find_project.outputs.project_dir }}/app/src/main/java/com/walhero/siramowathaba/MainActivity.java"

          if [ ! -f "$MAIN" ]; then
            echo "ERROR: MainActivity.java غير موجود"
            exit 1
          fi

          echo "MainActivity checksum:"
          sha256sum "$MAIN"

          echo "Checking corrected print method..."
          grep -n "printCurrentStudentRecordNative" "$MAIN"
          grep -n "openAndroidPrintDialog" "$MAIN"

          if ! grep -q "private void printCurrentStudentRecordNative" "$MAIN"; then
            echo "ERROR: الدالة printCurrentStudentRecordNative غير موجودة. الملف غير مصحح."
            exit 1
          fi

          if ! grep -q "openAndroidPrintDialog" "$MAIN"; then
            echo "ERROR: دالة openAndroidPrintDialog غير موجودة. الملف غير مصحح."
            exit 1
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Clean and build APK
        run: |
          cd "${{ steps.find_project.outputs.project_dir }}"
          gradle clean assembleDebug --no-build-cache

      - name: Rename APK
        run: |
          mkdir -p final-apk
          cp "${{ steps.find_project.outputs.project_dir }}"/app/build/outputs/apk/debug/*.apk "final-apk/sira-mowathaba-corrected-${{ github.run_number }}.apk"
          ls -lah final-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sira-mowathaba-corrected-${{ github.run_number }}
          path: final-apk/*.apk
